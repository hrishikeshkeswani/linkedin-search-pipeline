input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON logs from the FastAPI service
  if [container][name] =~ /linkedin-search-api/ {
    json {
      source => "message"
      target => "app"
    }

    # Extract search-specific fields
    if [app][query] {
      mutate {
        add_field => {
          "search_query"   => "%{[app][query]}"
          "n_results"      => "%{[app][n_results]}"
          "latency_ms"     => "%{[app][latency_ms]}"
          "expanded"       => "%{[app][expanded_queries_used]}"
          "reranked"       => "%{[app][reranked]}"
        }
      }
      mutate {
        convert => {
          "n_results"  => "integer"
          "latency_ms" => "float"
        }
      }
    }

    # Tag slow queries (>2 seconds)
    if [latency_ms] and [latency_ms] > 2000 {
      mutate { add_tag => ["slow_query"] }
    }

    # Tag zero-result searches
    if [n_results] == 0 {
      mutate { add_tag => ["zero_results"] }
    }
  }

  # Drop health check noise
  if [request][path] == "/health" {
    drop {}
  }

  # Parse timestamp
  date {
    match => ["[app][timestamp]", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "linkedin-search-%{+YYYY.MM.dd}"
  }
}
