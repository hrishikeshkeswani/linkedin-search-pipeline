version: "3.9"

services:
  # ── Search API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama3-8b-8192}
      - EMBED_DEVICE=cpu
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - FAISS_METADATA_PATH=/app/data/metadata.jsonl
      - LINKEDIN_SESSION_COOKIE=${LINKEDIN_SESSION_COOKIE:-}
    volumes:
      - faiss_data:/app/linkedin_search/data
    depends_on:
      - logstash
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pipeline_net

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - pipeline_net

  # ── Logstash ───────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"
      - "9600:9600"
    depends_on:
      - elasticsearch
    networks:
      - pipeline_net

  # ── Kibana ─────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - pipeline_net

  # ── Filebeat (ships API logs to Logstash) ─────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    user: root
    volumes:
      - ./monitoring/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    networks:
      - pipeline_net

volumes:
  faiss_data:
  es_data:

networks:
  pipeline_net:
    driver: bridge
