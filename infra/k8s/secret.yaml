# Apply with: kubectl apply -f secret.yaml
# Generate base64: echo -n "your_value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: linkedin-search-secrets
  namespace: linkedin-search
type: Opaque
data:
  GROQ_API_KEY: <base64-encoded-groq-api-key>
  LINKEDIN_SESSION_COOKIE: <base64-encoded-li_at-cookie>
